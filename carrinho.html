<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carrinho | Dominique Personalizados</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="carrinho.css">
</head>
<body>

  <section class="carrinho">
    <h2>🛒 Meu Carrinho</h2>

    <div id="carrinho-itens"></div>

    <div class="carrinho-total">
      <strong>Subtotal:</strong>
      <span id="subtotal">R$ 0,00</span>
    </div>

    <!-- 📦 FRETE -->
    <div class="frete-box">
      <h3>📦 Calcular Frete</h3>

      <input 
        type="text" 
        id="cep" 
        placeholder="Digite seu CEP"
        maxlength="9"
      >

      <button onclick="calcularFrete()">Calcular</button>

      <div id="frete-resultado"></div>
    </div>

    <div class="carrinho-total total-final">
      <strong>Total com frete:</strong>
      <span id="total">R$ 0,00</span>
    </div>

    <div class="carrinho-botoes">
      <a href="index.html#produtos" class="btn-voltar">
        ← Continuar comprando
      </a>

      <button class="btn-finalizar" onclick="finalizarCompra()">
        Finalizar compra
      </button>
    </div>

    <button class="btn-limpar" onclick="limparCarrinho()">
      🧹 Limpar carrinho
    </button>
  </section>

  <div id="toast"></div>

  <script src="carrinho.js"></script>
</body>
</html>
